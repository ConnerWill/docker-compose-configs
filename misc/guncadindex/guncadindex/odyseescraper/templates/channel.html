{% load settings %}
{% if linkurl %}
    <a href="{% url 'listreleases' %}?channel={{ object.handle }}">
    {% endif %}
    <div class="channel-item {{ secondaryclass }}">
        <img alt="Channel thumbnail"
             class="channel-thumbnail"
             width="128"
             height="128"
             src="{{ object.thumbnail_small }}" />
        <div class="channel-item-description">
            <h1>
                {% if object.highlighted_name %}
                    {{ object.highlighted_name|safe }}
                {% else %}
                    <b>{{ object.name }}</b>
                {% endif %}
            </h1>
            <span class="meta">{{ object.handle }}</span>
            {% if object.release_count %}<span class="meta">{{ object.release_count }} recent releases</span>{% endif %}
        </div>
    </div>
    {% if linkurl %}</a>{% endif %}
