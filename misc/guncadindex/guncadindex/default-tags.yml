gun-type:
  name: Gun Type
  color: '#1b4887'
  description: |
    It's a gun. But what KIND of gun?
  tags:
    handgun:
      name: Handgun
      description: |
        Guns that are designed to be fired from one or both hands without any additional points of contact.
    shotgun:
      name: Shotgun
      description: |
        Smoothbore guns that fire shot.
    pcc:
      name: PCC
      description: |
        Guns with a non-hand point of contact that fire pistol cartridges.
      lbry_tags:
        # Technically, SMG is a subset of PCC
        - smg
        - pcc
        - scorpionevo
    rifle:
      name: Rifle
      description: |
        Guns with a non-hand point of contact that fire rifle cartridges. For the purposes of this index, full-length rifles and carbines are in the same category.
      lbry_tags:
        - rifle
    airgun:
      name: Airgun
      description: |
        Not to be confused with an airsoft gun, an airgun uses compressed air to accelerate a projectile to a lethal level. It requires no gunpowder and is not a firearm in certain jurisdictions (like the US).

        Caution should be taken as airguns can have very unique quirks and handling risks. Familiarize yourself with the platform.
      lbry_tags:
        - airgun
    coilgun:
      name: Coilgun
      description: |
        A gun that uses multiple stages of magnetic coils to energize a ferromagnetic projectile.

        Not to be confused with a railgun, which uses lorentz forces to propel a projectile.
      lbry_tags:
        - coilgun
      implies:
        - electrical
    bullpup:
      name: Bullpup
      description: |
        Carbines/rifles where the action sits behind the trigger in some way. Oftentimes, the trigger you actuate will be linked mechanically to a secondary trigger/sear via a linkage.
      lbry_tags:
        - bullpup
    gatling-gun:
      name: Gatling Gun
      description: |
        Guns with multiple barrels that fire in sequence. Typically belt-fed.
      rules:
        m1337:
          title_regex: '^.*M1337.*$'
    flamethrower:
      name: Flamethrower
      description: |
        Guns that shoot fire instead of the typical lead projectile. These are often subject to different classes of restrictions than firearms.

        In the US, they're mostly unregulated. Check local laws, of course.
      lbry_tags:
        - flamethrower
    takedown:
      name: Takedown
      description: |
        The gun can be rapidly and easily dissassembled or collapsed for compact storage. No, folding stocks don't make the whole firearm collapsible.
    beltfed:
      name: Belt-Fed
      description: |
        Guns that, instead of feeding from a box magazine or something, ingest a series of linked cartridges, pulling the belt along as they fire using the energy from the action instead of spring pressure or something.

        Shoutouts to our boy Lima Six (L6).
diy:
  name: DIY-ability
  color: '#2060ba'
  description: |
    What parts of this release are the ones you can DIY at home?

    For the purposes of this index, top-shelf tooling like CNCs, lathes, and metal laser cutters will be excluded from all metrics of DIY-ability.
  tags:
    diy-everything:
      name: No Firearm Parts
      description: |
        Guns that take absolutely no off-the-shelf firearm parts. The creme de la creme.
      implies:
        - diy-fcg
        - diy-bolt
        - diy-barrel
      rules:
        channels-legacy-hybrid:
          channel_regex: '^@(TheGatalog-HybridDesigns)(:.*)?$'
        partisan-legacy-hybrid:
          title_regex: '^.*partisan(-| )?9.*$'
        songbird-legacy-printed:
          title_regex: '^.*songbird.*$'
        channels-legacy-printed:
          channel_regex: '^@(TheGatalog-PrimarilyPrintedDesigns)(:.*)?$'
    diy-fcg:
      name: DIY Fire Control
      description: |
        This release either contains or is an entirely DIY fire control system.

        Note: just because you can drop a CSGCG or whatever into most AR designs doesn't mean they get this tag. This means there's a DIY FCG included in the bundle.
    diy-bolt:
      name: DIY Bolt
      description: |
        This release either contains or is a DIY bolt -- the part that takes the pressure when firing the cartridge. Not to be confused with the bolt carrier.
    diy-bolt-carrier:
      name: DIY Carrier
      description: |
        This release either contains or is a DIY bolt carrier -- the part that's involved in cycling but doesn't actually take pressure.
    diy-upper:
      name: DIY Upper
      description: |
        This release either contains or is a DIY upper receiver assembly -- the part with the barrel, bolt, and maybe part of the recoil system.

        Uppers are oftentimes unserialized, but not always, such as in the case of the MP5.
    diy-recoil:
      name: DIY Recoil System
      description: |
        Bit more complicated, this: releases with this tag have a DIY-able recoil system beyond just a simple buffer or return spring.

        A prime example of this is in the case of the Bobcat, which uses rollers to slow the bolt's movement rearward.
    diy-gas:
      name: DIY Gas System
      description: |
        Some or all of the gas system in this firearm is DIY'd, OR substantial effort is made to make commercial gas systems more feasible, such as by adding heat mitigation.
    diy-barrel:
      name: DIY Barrel
      description: |
        The barrel's DIY'd.
    barrel-liner:
      name: Barrel Liner
      description: |
        This release uses a commercially-available barrel liner. Liners can often be ECM'd, but this release was not put out with 100% DIY barrels in mind.
tooling:
  name: Tools and Techniques
  color: '#456659'
  description: |
    What kinds of tools and unique machining techniques are required to assemble this release?
  tags:
    ecm:
      name: ECM
      description: |
        Short for electrochemical machining, this process allows you to etch complicated geometry into normally very robust material. Often used to etch rifling.
      lbry_tags:
        - ecm
    welding:
      name: Welding
      description: |
        This release requires you to use a welder to unite multiple metal parts together.
      lbry_tags:
        - welding
        - welder
        - weld
    cnc:
      name: CNC
      description: |
        Use of a CNC machine is required to produce the complicated geometry of certain parts of this build.

        Builds with this tag are never classified as fully DIY.
      lbry_tags:
        - cnc
    lathe:
      name: Lathe
      description: |
        There's no getting around it. You need a lathe.

        Builds with this tag are never classified as fully DIY.
      lbry_tags:
        - lathe
    electrical:
      name: Electrical
      description: |
        Assembly will require you to do some minor electrical work, like some soldering and splicing.
      lbry_tags:
        - electrical
        - electronics
    bending:
      name: Bending
      description: |
        You gotta bend it. And the bends might be complicated.

        Bending, depending on the material, can often be trivially accomplished with some jigs and hand tools.
      lbry_tags:
        - bending
    press:
      name: Press
      description: |
        A high-pressure press is necessary to assemble this release. This is sometimes a requirement for certain barrels, like in HK rollerguns.
    special-filament:
      name: Special Filament
      description: |
        Standard, low-temp filaments will not be satisfactory for this release. High-temperature engineering filaments will be required.
    low-temp-casting:
      name: Pouring
      description: |
        The builder will be required to pour low-temperature metal alloys as part of assembly, such as lead or cerrosafe. This can usually be accomplished with household tooling.
      lbry_tags:
        - pouring
        - cerrosafe
    high-temp-casting:
      name: Casting
      description: |
        The builder will need to cast high-temperature metals, like aluminum. Not for the faint of heart.
      lbry_tags:
        - casting
    laser-cutting:
      name: Laser Cutting
      description: |
        The use of a laser cutter or laser cutting service will be necessary to acquire some of the components for this build.
    unusual-tooling:
      name: Unusual Tooling
      description: |
        This release requires some form of weird, off-the-wall unusual tooling or fabrication methods to complete it.
meta:
  name: Meta
  color: '#294522'
  use_for_weighting: false
  description: |
    Metadata about the release.
  tags:
    beta:
      name: Beta
      description: |
        This release may contain content that is undergoing beta testing.

        Caution should be taken when manufacturing and using. Assembly instructions may be inadequate. Consult the author for more details.
      rules:
        open-beta-title:
          title_regex: '^.*beta.*$'
        open-beta-description:
          description_regex: '^.*open\s*beta.*$'
    # Regulatory stuff
    form-1:
      name: ATF Form 1
      description: |
        For those in the US:

        This device (or devices directly related to it) is/are liable to require an ATF Form 1 to be filed before you collect anything for their manufacture.
    eforms-ready:
      name: eForms Ready
      description: |
        This release is listed in the ATF eForms system and does not need to be manually entered.

        For those unaware, when filing a Form 1, new designs may be delayed while the ATF reviews your form for accuracy and completeness. Once they do, they add the details of that Form 1 to their website so they can skip those checks for later forms. This release is one that you don't have to wait on.

        Can be applied to a lot of stuff -- suppressors, SBRs, SBSs, DDs, etc.
    sot-only:
      name: SOT Only
      color: "#dd0000"
      description: |
        For those in the US:

        This release contains files that can only legally be manufactured by a SOT. If you don't know what that is, it's illegal for you to make this.

        Like, this isn't a funny you-have-wiggle-room kinda deal. This is a do-not-pass-go, straight to jail, 10 year prison sentence. Be careful.
      lbry_tags:
        - autosear
        - auto-sear
        - full auto
        - 3rd hole
      rules:
        nofun-specifics:
          title_regex: '^.*(churned butter|autosear).*$'
        nofun-dias:
          title_regex: '^.*\s*DIAS\s*.*$'
        nofun-swift-link:
          title_regex: '^.*swift(-| )?link.*$'
        nofun-choosy:
          title_regex: '^.*choosy.*$'
        nofun-sffa:
          title_regex: '^.*SFFA.*$'
    dev-pack:
      name: Dev Pack
      description: |
        Release contains models and/or source files intended for developers.
      lbry_tags:
        - template
      rules:
        channels:
          channel_regex: '^@(TheBLCReferencePage)(:.*)?$'
        info-package:
          title_regex: '^.*info(rmation)?\s*package.*$'
        cad-files:
          title_regex: '^.*solidworks\s*files.*$'
        unfinished-title:
          title_regex: '^.*(un|not)\s*finished.*$'
        dev-pack-title:
          title_regex: '^.*dev(elopment|eloper(s)?)?\s*(pack|kit|blank).*$'
        dev-pack-description:
          description_regex: '^.*dev(elopment|eloper(s)?)?\s*(pack|kit|blank).*$'
    meta-unlisted:
      name: Unlisted
      color: "#991111"
      description: |
        This content was unlisted from Odysee by its author. It cannot be downloaded from Odysee and could potentially no longer be on LBRY.

        Additionally, the author probably had very good reasons for delisting this file. It may be unfinished, dangerous, unsupported, or just downright unfit for use. If you reach out to the author concerning support for this file, you may be laughed at.

        Unlisted content is displayed on this site for parity with the LBRY Desktop app. If you are the author of this release and would like to have it hidden from this site, please reach out to the website administrator.
      lbry_tags:
        - c:unlisted
cartridge:
  name: Cartridge/Ammunition
  description: |
    What kind(s) of ammunition is this release pertinent to?
  tags:
    primer-only:
      name: Primer Only
      description: |
        This release is pertains to a style of ammunition that is explicitly designed to be very low-pressure and not run any powder.

        Loading a full-power cartridge of similar or identical dimensions is very likely to cause catastrophic malfunction. Tread carefully.
      lbry_tags:
