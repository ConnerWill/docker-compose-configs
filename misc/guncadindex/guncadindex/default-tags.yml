        xd-title:
          title_regex: '^.*XD(\s|-)?(40|9).*$'
        xd-series-title:
          title_regex: '^.*XD\s*Series.*$'
    lc9:
      name: Ruger LC9
      description: |
        Tiny subcompact 9mm handgun, and apparently cali compliant?

        This tag also matches for the LC9s, its striker-fired cousin.
      implies:
        - ruger
        - 9x19mm
        - handgun
      lbry_tags:
        - lc9
        - lc-9
        - lc 9
        - lc9s
        - lc-9s
        - ruger lc
        - ruger lc9
        - ruger lc9s
    m1911:
      name: M1911
      description: |
        Something something two world wars or whatever.
      implies:
        - 45-acp
        - handgun
      lbry_tags:
        - m1911
        - "1911"
        - m1911a1
        - 1911a1
        - colt 1911
        - colt m1911
    glock-17l:
      name: Glock 17L
      description: |
        It's a 17, but with a longer slide
      implies:
        - glock
        - 9x19mm
      lbry_tags:
        - g17l
        - glock17l
        - 17l
        - glock 17l
    glock-17:
      name: Glock 17
      description: |
        Releases that are intended to complete or furnish a Glock 17
      implies:
        - glock
        - 9x19mm
      lbry_tags:
        - "17.2"
        - g17
        - glock17
        - glock 17
        - dd17
        - dd17.2
      rules:
        basic:
          title_regex: '^.*(FMDA|DD|G|Glock)(\s|-|\.)*17.*$'
        chairmanwon:
          channel_regex: '^@chairmanwon(:.*)?$'
          title_regex: '^.*17.*$'
    glock-19:
