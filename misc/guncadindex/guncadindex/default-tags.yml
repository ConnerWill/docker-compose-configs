license:
  name: License
  color: "#5a6e43"
  description: What license is this release under?
  use_for_weighting: false
  tags:
    sharable:
      name: Sharable
      color: "#43476e"
      description: |
        This release is made available under a license that permits redistribution. See the license included in the file for more information.
    remixable:
      name: Remixable
      color: "#43476e"
      description: |
        This release is made available under a license that permits derivative works and remixes. See the license included in the file for more information.
    commercial:
      name: Commercial
      color: "#43476e"
      description: |
        This release is made available under a license that permits commercial use. See the license included in the file for more information.
    bad-license:
      name: Malformed License
      color: "#734349"
      description: |
        The author of this release has supplied a bad license. It may be a joke license or something malformed. Tread carefully with remixes.
      licenses:
        - "^.*retarded.*$"
    all-rights-reserved:
      name: ARR
      color: "#734349"
      description: |
        All rights reserved. The author has explicitly NOT licensed this file for redistribution or derivative works. Do not redistribute.
      licenses:
        - "^.*No part.*without.*copyright owner.*$"
        - "^All rights reserved.*$"
    public-domain:
      name: Public Domain
      color: "#5a6e43"
      description: |
        This release was placed into the public domain. It may be modified and redistributed however one wishes.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^.*Public Domain.*$"
    cc-by-nc-nd:
      name: CC-BY-NC-ND
      color: "#734349"
      description: |
        A Creative Commons license that allows redistribution with credit, but prohibits doing so commercially and PROHIBITS REMIXES. Deriviative works may NOT be shared.
      implies:
        - sharable
      licenses:
        - "^Creative Commons Attribution-NonCommercial-NoDerivatives .*$"
    cc-by-nc-sa:
      name: CC-BY-NC-SA
      color: "#5a6e43"
      description: |
        A Creative Commons license that allows redistribution with credit and allows remixes, but prohibits doing so commercially. Those remixes must also be licensed under this license.
      implies:
        - remixable
        - sharable
      licenses:
        - "^Creative Commons Attribution-NonCommercial-ShareAlike .*$"
        - "^Creative Commons CC BY NC SA$"
    cc-by-nc:
      name: CC-BY-NC
      color: "#5a6e43"
      description: |
        A Creative Commons license that allows redistribution with credit and allows remixes, but prohibits doing so commercially. Remixes must include a link to this license and the source material, but can have their own license.
      implies:
        - remixable
        - sharable
      licenses:
        - "^Creative Commons Attribution-NonCommercial .*$"
    cc-by-sa:
      name: CC-BY-SA
      color: "#5a6e43"
      description: |
        A Creative Commons license that allows redistribution with credit and allows remixes. Those remixes must also be licensed under this license.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^Creative Commons Attribution-ShareAlike .*$"
    cc-by-nd:
      name: CC-BY-ND
      color: "#734349"
      description: |
        Creative Commons license that allows redistribution with credit and PROHIBITS REMIXES. Deriviative works may NOT be shared. The file may be used commercially.
      implies:
        - sharable
        - commercial
      licenses:
        - "^Creative Commons Attribution-NoDerivatives .*$"
    cc-by:
      name: CC-BY
      color: "#5a6e43"
      description: |
        A Creative Commons license that allows redistribution and remixes, provided you give credit. You must include a link to the original release and a copy of this license, but can license your work under whatever and can do so commercially.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^Creative Commons Attribution .*$"
    gpl:
      name: GPL
      color: "#5a6e43"
      description: |
        The author of this work has licensed it under some variant of the GPL. While technically okay, the GPL is not designed to protect artwork and may lack coverage or introduce ambiguity.

        If this isn't code, consider asking the author to reconsider their license choice to some variant of a Creative Commons license.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^.*GPL.*$"
    mit:
      name: MIT
      color: "#5a6e43"
      description: |
        The author of this work has licensed it under some variant of the MIT License, which requires attribution and the inclusion of the MIT license somewhere in any derivative works and redistributions.

        If this isn't code, consider asking the author to reconsider their license choice to some variant of a Creative Commons license.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^.* MIT.*$"
        - "^MIT.*$"
    ruby:
      name: Ruby (License)
      color: "#5a6e43"
      description: |
        The author of this release has licensed it under the GUNCAD Ruby License. It's similar to CC-BY-NC-SA.

        The GUNCAD Ruby License may be available on this Index -- feel free to search for it.
      implies:
        - remixable
        - sharable
      licenses:
        - "^.* Ruby .*$"
    wtfpl:
      name: WTFPL
      color: "#5a6e43"
      description: |
        You just DO WHAT THE FUCK YOU WANT.

        It's basically public domain.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^.*WTFPL.*$"
        - "^.*what the fuck.*license.*$"
    unlicense:
      name: Unlicense
      color: "#5a6e43"
      description: |
        It's like the opposite of a license. Or, well, I guess the opposite of a license is all-rights-reserved...

        It's a public domain-like.
      implies:
        - remixable
        - sharable
        - commercial
      licenses:
        - "^.*Unlicense.*$"
