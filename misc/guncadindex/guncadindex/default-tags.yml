---
group:
  name: Release Group
  color: '#4c4161'
  description: |
    Was a group related to the development, testing, or shipping of this release?
  use_for_weighting: false
  tags:
    gatalog:
      name: Gatalog
      description: |
        The Gatalog, formerly Deterrence Dispensed. One of the largest GunCAD groups out there.

        They opt for long development times and rigorous documentation/testing standards.
        Visit their website thegatalog.com to connect to their RocketChat for testing and questions.
      rules:
        gatalog-channels:
          channel_regex: '^@TheGatalog-(PrintableMagazines|Accessories|Suppressors|HybridDesigns|PrimarilyPrintedDesigns|PrintableFramesReceivers|ReferenceModels|TechnicalDataPackages)(:.*)?$'
        gatalog-aux:
          channel_regex: '^@TheGatalogAuxiliary(:.*)?$'
        detdisp:
          channel_regex: '^@Deterrence-Dispensed(-Archive)(:.*)?$'
    awcy:
      name: AWCY?
      description: |
        NOTICE: Persuant to a request by v8, AWCY? content from official AWCY? channels is currently not indexed. This tag will ONLY match third-party remixes and additions for AWCY? platforms.

        Are We Cool Yet? is one of the largest GunCAD groups.

        They organize mostly on Matrix and have fast development cycles.
      rules:
        awcy-channels:
          channel_regex: '^@AreWeCoolYet(:.*)?$'
        awcy-arms:
          channel_regex: '^@awcy_arms(:.*)?$'
    blc:
      name: Black Lotus Coalition
      description: |
        Black Lotus Coalition is a GunCAD group headed by Moderator Gage. Of the biggest groups, they divest the most.

        The initial dataset for GunCAD Index came from their list of Odysee channels.
      lbry_tags:
        - blacklotuscoalition
      rules:
        blc-channels:
          channel_regex: '^@blacklotuscoalition(:.*)?$'
        blc-aux:
          channel_regex: '^@TheBLCReferencePage(:.*)?$'
        blc-firearm-reference-models:
          channel_regex: '^@FirearmReferenceModels(:.*)?$'
    inmc:
      name: INMC
      description: |
        "In Minecraft"
      lbry_tags:
        - inmc
      rules:
        inmc_channels:
          channel_regex: '^@INMC(:.*)?$'
    gci:
      name: GCI "Gun CAD Ideas"
      description: |
        Not to be confused with the GunCAD Index. The team is unrelated.
      lbry_tags:
        - gci
      rules:
        gci_channels:
          channel_regex: '^@Gun_Cad_Ideas(:.*)?$'
type:
  name: Primary Type
  color: '#4a4743'
  description: What kind of thing is this?
  tags:
    trinket:
      name: Trinket
      description: |
        Stuff that's relevant to 3D2A but isn't really functional, like little statues, tributes, iconography, that sort of thing.
      lbry_tags:
        - trinket
    book:
      name: Book/Manual
      description: |
        Reading material adjacent to/relevant for gun stuff, but no actual guns.

        And yes, readable magazines should be tagged under this. Sorting that out is going to suck.
      lbry_tags:
        - ebook
        - book
    gear:
      name: Gear
      description: |
        Accessories that you would carry out into the field with a firearm, but on your person, not your weapon. Things like chest rigs, rig attachments, helmets, NVGs, etc.
      lbry_tags:
        - gear
    grenade:
      name: Grenade
      description: |
        You fill it full of fun things and it goes boom.
      implies:
        - destructive-device
      lbry_tags:
        - grenade
      rules:
        title:
          title_regex: '^.*grenade.*$'
    airsoft:
      name: Airsoft Gun
      description: |
        Not to be confused with an airgun, which is a lethal firearm. An airsoft gun is purely for usage in sporting.

        Now, you may be asking yourself: are airsoft guns REALLY something we need to catalog on the Index?

        No, not really.

        But the FGC-6 is really neat and its furniture has some level of overlap with the FGC-9.
    bladed-weapon:
      name: Bladed Weapon
      description: |
        That's not a knoife.
        THIS is a KNOIFE.
      lbry_tags:
        - "push dagger"
        - serrated
        - knife
      rules:
        bayonet:
          title_regex: '^.*bayonet.*$'
        push-dagger:
          title_regex: '^.*push\s*dagger.*$'
        striker-pocket:
          title_regex: '^Striker Pocket$'
    accessory:
      name: Accessory
      description: |
        Accessories are items that pertain to and are useful in conjunction with firearms but are not themselves firearms. Examples include lights, magloaders, certain trigger systems, etc.

        Not to be confused with "Gear", which are attached to the user.
      lbry_tags:
        - killflash
        - kill flash
      rules:
        channels:
          channel_regex: '^@(TheGatalog-Accessories)(:.*)?$'
        holsters:
          title_regex: '^.*(H|h)olster.*$'
        accessories:
          title_regex: '^.*accessor(y|ies).*$'
        chamber-flag:
          title_regex: '^.*chamber\s*flag.*$'
    reference-model:
      name: Reference Model
      description: |
        Firearms and related designs that are for CAD use ONLY. They are not to be printed under any circumstance by builders pursuing a functional firearm.
      implies:
        - dev-pack
      rules:
        channels:
          channel_regex: '^@(TheGatalog-ReferenceModels|FirearmReferenceModels)(:.*)?$'
    tdp:
      name: TDP
      description: |
        Technical data packages include blueprints and the like that aren't STEP files but nonetheless useful for making drawings.
      implies:
        - dev-pack
      lbry_tags:
        - blueprint
      rules:
        channels:
          channel_regex: '^@(TheGatalog-TechnicalDataPackages|TechnicalDataPacks|TechnicalDataSheetsBlueprints|ArmamentKnowledgeRepository)(:.*)?$'
        title:
          # Why does this have a random wildcard in "technical"?
          # https://guncadindex.com/detail/22ad28b2385f5034ab0604876e8949a9f9536510
          # That's why
          title_regex: '^.*tech.*cal\s*data\s*package.*$'
    gun:
      name: Gun
      description: |
        It's a thing that shoots a projectile out of a barrel. Also refers to just the serialized parts of those devices, where applicable.

        >Patrick, that's a gun.
        <Yes.
      rules:
        channels-legacy-frame-or-receiver:
          channel_regex: '^@(TheGatalog-PrintableFramesReceivers|LFRF)(:.*)?$'
        channels-legacy-hybrid:
          channel_regex: '^@(TheGatalog-HybridDesigns)(:.*)?$'
        partisan-legacy-hybrid:
          title_regex: '^.*partisan(-| )?9.*$'
        songbird-legacy-printed:
          title_regex: '^.*songbird.*$'
        channels-legacy-printed:
          channel_regex: '^@(TheGatalog-PrimarilyPrintedDesigns)(:.*)?$'
    frame-or-receiver:
      name: Frame/Receiver
      description: |
        (LEGACY TAG: TO BE REMOVED)

        Anything that would be considered by the ATF to be the frame or receiver of a firearm and thus require serialization. This tag is only for kit builds, not for hybrid releases like the FGC-9 which take no gun parts.

        Releases like the Orca, ARK, Bobcat, and similar are frames/receivers since they still require off-the-shelf gun parts.
      rules:
        channels:
          channel_regex: '^@(TheGatalog-PrintableFramesReceivers|LFRF)(:.*)?$'
    hybrid-firearm:
      name: Hybrid Firearm
      description: |
        (LEGACY TAG: TO BE REMOVED)

        A hybrid firearm is a firearm that requires no off-the-shelf gun parts but is not entirely 3D-printed. Manufacture of extra components, such as metal bolts, ECM barrels, etc. will be required. Guns that only require off-the-shelf fasteners and springs are not considered hybrid.

        Guns that have a 100%-DIY option but can optionally take off-the-shelf gun parts (like how the FGC can take an AR trigger group or the Urutau an AR-9 barrel) are still hybrids.
      rules:
        channels:
          channel_regex: '^@(TheGatalog-HybridDesigns)(:.*)?$'
        partisan:
          title_regex: '^.*partisan(-| )?9.*$'
    printed-firearm:
      name: Printed Firearm
      description: |
        (LEGACY TAG: TO BE REMOVED)

        "But aren't they all printed firearms?"

        No. These are specifically for firearms that are primarily or, God forbid, WHOLLY printed. They may omit barrel liners and even fasteners.
      rules:
        songbird:
          title_regex: '^.*songbird.*$'
        channels:
          channel_regex: '^@(TheGatalog-PrimarilyPrintedDesigns)(:.*)?$'
    destructive-device:
      name: Destructive Device
      description: |
        Generally speaking, any explosive. Includes grenades, rockets, and other anti-personnel launcher equipment. Does NOT include signalling devices like flare guns.

        Almost any of these are illegal to make in the States without proper licensure. They're also probably illegal to make in a lot more places, too.
      implies:
        - form-1
    signaling-device:
      name: Signaling Device
      description: |
        Flare guns, more or less. Fireworks are also signals. Common calibers include 37mm and 26.5mm

        Note that this is a classification based on purpose and purpose alone. If you put a grenade in your 37mm launcher, it's a DD now.
      rules:
        signaling-device-title:
          title_regex: '^.*signal(l)?ing\s*device.*$'
        nt79:
          title_regex: '^.*NT(-)?79.*$'
    magazine:
      name: Magazine
      description: |
        Detachable box magazines.
      lbry_tags:
        - magazine
      rules:
        wafflemags-are-mags:
          title_regex: '^.*waffle\s*mag.*$'
        magazines-in-title:
          title_regex: '^.*mag(azine)?s.*$'
        channels:
          channel_regex: '^@(TheGatalog-PrintableMagazines|LFM)(:.*)?$'
        dmb-drum:
          title_regex: '^.*D\.R\.U\.M.*$'
platform:
  name: Platform
  description: |
    Most firearms and parts can trace their lineage directly upward to a common ancestor from which they all exchange some degree of mutual compatibility or heritage.
  color: '#693e19'
  tags:
    savage-mkii:
      name: Savage Mark II
      description: |
        A series of bolt-action rifles developed by -- you guessed it -- Savage.
      implies:
        - 22lr
        - rifle
        - savage
      rules:
        title:
          title_regex: '^.*Savage\s*(Mark|mk|m)(2|ii|ll).*$'
    aug:
      name: AUG
      description: |
        A bullpup rifle by Steyr. The upper is the serialized part.
      implies:
        - 556x45mm
        - 300blk
        - bullpup
        - steyr
      lbry_tags:
        - aug
        - nylaug
      rules:
        nylaug:
          title_regex: '^.*nylaug.*$'
    harlot:
      name: Harlot
      description: |
        A buyback gun. It's a little 22 derringer that prints entirely on one build plate in just a couple hours and is a functioning firearm.

        It features a compliant mechanism trigger, which means it's either completely unsafe or impossible to pull.
      implies:
        - 22lr
        - printed-firearm
      lbry_tags:
        - harlot
      rules:
        harlot:
          title_regex: '^.*(H|h)arl(o|e)t.*$'
        quiet-girl:
          title_regex: '^.*quiet\s*girl.*$'
    fgc-9:
      name: FGC-9
      description: |
        The Fuck Gun Control 9mm pistol-caliber carbine. By far one of the most influential firearms in GunCAD history, possibly even firearm history.

        This tag matches the original FGC-9 along with the vastly more popular MkII and all of its variants.
      implies:
        - 9x19mm
        - hybrid-firearm
      lbry_tags:
        - fgc-9
        - fgc-9 mk2
        - fgc9
        - stingray
      rules:
        fgc-9:
          title_regex: '^.*FGC(-)?9.*$'
    fgc-6:
      name: FGC-6
      description: |
        The FGC-6 is a "blowback" AEG airsoft system modeled after the FGC-9.

        Its accessories can have some level of overlap with the FGC-9 and its variants.
      implies:
        - airsoft
        - 6mm-bb
      lbry_tags:
        - fgc-6
        - fgc6
    mp22:
      name: MP22
      description: |
        An entirely DIY .22lr MP5 clone. Not to be confused with existing MP5 .22lr clones.
      implies:
        - 22lr
        - rifle
        - hybrid-firearm
      lbry_tags:
        - mp22
        - mp22k
      rules:
        original-gci-release:
          title_regex: '^MP22K, Carbine, and SD$'
        mp22-title:
          # Specifically doesn't match the carbine variant
          title_regex: '^.*MP22(K|SD).*$'
    urutau:
      name: Urutau
      description: |
        The bullpup cousin to the FGC-9, the Urutau is a 100% DIY-able 9mm carbine platform.

        No it does not take Glock mags.
      implies:
        - 9x19mm
        - bullpup
        - hybrid-firearm
      lbry_tags:
        - urutau
      rules:
        urutau-title:
          title_regex: '^.*Urutau.*$'
    ar-15:
      name: AR-15
      description: |
        Matches all of the AR-15s, including all carbine and rifle variants, the M16, bullpup conversions, and generally anything that takes the gas system, bolt assembly, and barrel off of one.

        DOES NOT match things that take AR-15 FCGs and does not necessarily imply as much.
      implies:
        - rifle
      lbry_tags:
        - ar15
        - ar-15
        - "ar pistol"
        - hellfire
        - m4
        - m-4
        - m16
        - m-16
      rules:
        title-mk-18:
          title_regex: '^.*MK(-|\s)?18.*$'
        title-sl-15:
          title_regex: '^.*sl(-|\s)?15.*$'
        title-bidens-bane:
          title_regex: '^.*biden.*s\s*bane.*$'
        title-lower:
          title_regex: '^.*AR(-)?15.*lower.*$'
        orca:
          title_regex: '^.*Orca.*$'
    ar9:
      name: AR-9
      description: |
        An AR-15... kinda... that takes a direct-blowback 9mm bolt, no gas system, and special-made barrels. No lockup mechanism.

        This tag is specifically for kits/parts that take commercial AR-9 components.
      implies:
        - 9x19mm
      lbry_tags:
        - ar-9
        - ar9
    ar22:
      name: AR-22
      description: |
        An AR-15... shaped... ish thing that in no way operates the same but for some reason gets the name. Normally it refers to an AR-pattern rifle that's had a .22LR blowback conversion kit stuffed in it, but those lines blur when you can print that whole assembly, fuck with the receiver designs, ditch the buffer tube...

        The EZ-22, HD-22, etc. get classified under this.
      implies:
        - 22lr
        - rifle
      lbry_tags:
        - ez22
        - hd22
        - hd22c
        - sg22
        - ar22
        - ar-22
      rules:
        baby-barrett:
          title_regex: '^.*baby\s*barr?ett?.*$'
        m4gery:
          title_regex: '^.*m4(-?|\s*)gery.*$'
        common-designs:
          title_regex: '^.*(DeAR|AR|EZ|HD)(-)?22.*$'
        tubee-22-title:
          title_regex: '^.*tubee.*$'
    ar10:
      name: AR-10
      description: |
        Matches all AR-10s, the .308 older cousin to the AR-15.
      implies:
        - rifle
        - 762x51mm
      rules:
        title-lower:
          title_regex: '^.*(AR|LR|BUBAR)(-)?10.*lower.*$'
        title-lr308:
          title_regex: '^.*LR(-|\.)?308.*$'
    ak:
      name: AK
      description: |
        I'll be honest -- I don't know enough about Kalashnikovs to tell you how tagging should be split up. So you guys get this tag.

        Contributions are welcome.
      implies:
        - rifle
      lbry_tags:
        - ak
        - ak47
        - ak-47
        - akm
      rules:
        plastikov-title:
          title_regex: '^.*plastikov.*$'
        groznt:
          title_regex: '^.*groznt.*$'
    m10:
      name: M-10
      description: |
        A seriously stupid simple silly straight-blowback sheet steel .45 ACP-spittin screamer of a platform.

        Also known as the MAC-10. Technically that nomenclature is reserved for the full-auto variant, but yaknow, potato potato.
      implies:
        - cobray
        - 45-acp
      lbry_tags:
        - mac10
        - the big mac
        - mac 10
        - mcgangbang
        - mac45
    cz-scorpion:
      name: Scorpion
      description: |
        A very, very popular 9mm straight-blowback PCC platform by CZ.
      implies:
        - cz
      lbry_tags:
        - czscorpion
        - cz scorpion
        - cz scorpion evo
        - scorpion
        # Haha, Laffs typo'd
        - socrpion evo
        - scorpion evo
        - evo
      rules:
        cz-scorpion-title:
          title_regex: '^.*cz\s*scorpion.*$'
        awcy-scz0rpion:
          title_regex: '^.*scz0rpion.*$'
    m11-9:
      name: M-11/9
      description: |
        A seriously stupid simple silly straight-blowback sheet steel... 9mm PCC platform.
      implies:
        - cobray
        - 9x19mm
      lbry_tags:
        - scarab
        - macdaddy
        - mac11
        - mac11/9
        - db9
      rules:
        sumac:
          title_regex: '^.*sumac.*$'
        m11-title:
          title_regex: '^.*M(ac)?(-)?(11|Daddy).*$'
        db9-title:
          title_regex: '^.*DB(-)?\s?(9|Alloy).*$'
        mac-and-cheese:
          title_regex: '^.*mac\s(and|n)\scheese.*$'
        mac-and-cheese-hidden-gala:
          title_regex: '^.*hidden\sgala.*$'
    mp5:
      name: MP5
      description: |
        A lauded PCC, the MP5 uses a roller-delay system to retard blowback forces, resulting in a smoother action, lighter recoil, and more expensive build.

        Also captures MP5 variants, so all the different calibers and lengths.
      implies:
        - hk
        - pcc
        - 9x19mm
      rules:
        leber:
          title_regex: '^.*leber.*$'
          channel_regex: '^@s3igu2:.*$'
        sf5:
          title_regex: '^.*((S|K)F|MP)\.?5(?![^\s]*7).*$'
    ruger-1022:
      name: Ruger 10/22
      description: |
        A lightweight, compact direct-blowback 22LR rifle platform.
      implies:
        - ruger
        - 22lr
      rules:
        1022-title:
          title_regex: '^.*10[\/-]?22(?!\/).*$'
        guinea-pig:
          title_regex: '^.*guinea.*pig.*$'
          description_regex: '^.*ruger.*$'
        piglet:
          title_regex: '^.*piglet.*$'
          description_regex: '^.*ruger.*$'
    ruger-standard:
      name: Ruger Standard Model
      description: |
        The MK I, the MK II, etc. All of them are variants of the Ruger Standard Model.
      implies:
        - ruger
        - 22lr
      lbry_tags:
        - mk series
        - 22/45
        - ruger mark
        - ruger mk
        - ruger mki
        - ruger mk1
        - ruger mkii
        - ruger mk2
        - ruger mkiii
        - ruger mk3
        - mkiii
        - ruger mkiv
        - ruger mk4
        - mkiv
      rules:
        ruger-mk-title:
          title_regex: '^.*ruger\s*mk.*$'
        awcy-mkcarbon:
          title_regex: '^.*mkcarbon.*$'
        cathedral-mkx:
          title_regex: '^.*cathedral\s*mkx.*$'
    tec-9:
      name: TEC-9
      description: |
        That one gun that everyone got real upset about in 1989.
      implies:
        - 9x19mm
        - intratec
      lbry_tags:
        - tec9
        - tec-9
      rules:
        tec-9:
          title_regex: '^.*TEC-9.*$'
        czech-nine:
          title_regex: '^.*czech\s*nine.*$'
    tac-9:
      name: TAC-9
      description: |
        Not to be confused with the TEC-9, which is Intratec's most famous gun, but the Sol Invictus TAC-9, which is not compatible.
      implies:
        - 9x19mm
      lbry_tags:
        - sol invictus
      rules:
        tacdaddy:
          title_regex: '^.*Tac(\s|-)?Daddy.*$'
    tec-22:
      name: TEC-22
      description: |
        It's like the TEC-9, but it takes 10/22 mags.
      implies:
        - 22lr
        - intratec
      lbry_tags:
        - tec-22
        - tec22
    p90:
      name: FN P90
      description: |
        A bullpup PDW by FN, fires 5.7x28mm cartridges.

        Not to be confused with a Ruger P90.
        Also not to be confused with an AWCY 3DP90.
      implies:
        - 57-28mm
        - pcc
        - fn
      lbry_tags:
        # Why are we not matching against P90?
        # Ask Ruger.
        - ps90
      rules:
        fn-p90-title:
          title_regex: '^.*FN\s*PS?90.*$'
    3dp90:
      name: 3DP90
      description: |
        Aesthetically very similar to the FN P90, the AWCY 3DP90 doesn't actually take any P90 parts. Thus it's actually its own completely unrelated firearm.

        Still takes P90 mags, though.
      implies:
        - 57-28mm
        - pcc
        - bullpup
      lbry_tags:
        - 3dp90
      rules:
        3dp90-title:
          title_regex: '^.*3DP90.*$'
    ruger-p90:
      name: Ruger P Series
      description: |
        Ruger's line of polymer-frame striker-fired handguns.

        Not to be confused with an FN P90.
      implies:
        - ruger
    beretta-92fs:
      name: 92fs
      description: |
        Also known as the military designation of M9
      implies:
        - beretta
        - 9x19mm
      lbry_tags:
        - 92fs
      rules:
        sphynx:
          title_regex: '^.*sphynx.*$'
    sig-p320:
      name: Sig P320
      description: |
        The P320. It ends today.
      implies:
        - 9x19mm
        - 10mm-auto
        - 40sw
        - 357-sig
        - 45-acp
        - sig
      lbry_tags:
        - p320
        - "320"
    sig-p365:
      name: Sig P365
      description: |
        I unno, it's a subcompact striker fired handgun.
      implies:
        - 9x19mm
        - 380-acp
        - sig
      lbry_tags:
        - p365
    xd:
      name: XD
      description: |
        The Springfield Armory XD series is another goddamn striker fired handgun platform.

        Matches at least the XD9/XD40.
      implies:
        - springfield
      lbry_tags:
        - springfieldxd
        - xd9
        - xd 9
        - xd-9
        - xd40
        - xd 40
        - xd-40
