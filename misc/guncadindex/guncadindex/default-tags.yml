  color: '#536782'
  description: |
    The type of accessory this release is.
  tags:
    frt:
      name: FRT
      description: |
        Items pertaining to force-reset trigger systems, which are trigger systems where the action pushes the trigger back into a reset position as part of cycling. Not to be confused with full-auto conversion devices, which do not reset the trigger.
      lbry_tags:
        - frt
        - super safety
        - super safe
        - supersafety
        - supersafe
        - htss
        - ssak
      rules:
        super-safety:
          title_regex: '^.*Super\s*Safe.*$'
    auto-sear:
      name: Auto Sear
      color: "#dd0000"
      description: |
        Items that facilitate machine gun conversion, where a machine gun is defined as a gun that fires multiple rounds in a single trigger pull. This includes Glock Switches, AR DIASs, and more.

        Note that, for most people, these are SUPER HYPER TURBO ILLEGAL and you should NOT manufacture them.
      implies:
        - sot-only
      lbry_tags:
        - switch
        - dias
        - autosear
        - machinegun
        - "machine gun"
        - mgcd
        - glockswitch
        - "glock switch"
    # Accessories
    suppressor:
      name: Suppressor
      description: |
        Anything that attaches to the end of a firearm's barrel whose purpose is to mitigate the resultant noise of and/or suppress the gas from discharging that firearm. Also called a 'silencer'.
      implies:
        - muzzle-device
        - accessory
        - form-1
      lbry_tags:
        - ftn
        - suppressor
        - silencer
      rules:
        channels:
          channel_regex: '^@(TheGatalog-Suppressors)(:.*)?$'
        pill-popper:
          title_regex: '^.*pill\s*popper.*$'
        ftn:
          title_regex: '^.*FTN.*$'
        kcad:
